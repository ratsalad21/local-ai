version: "3.9"

services:
  vllm:
    image: vllm/vllm-openai:nightly
    container_name: vllm-server
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    ports:
      - "8000:8000"
    volumes:
      - "G:/local-ai/vllm/cache:/root/.cache/huggingface"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    command: >
      --model Qwen/Qwen2.5-7B-Instruct
      --dtype auto
      --gpu-memory-utilization 0.92
      --max-model-len 4096
      --max-num-batched-tokens 16384
      --max-num-seqs 16
      --host 0.0.0.0
      --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models')\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: unless-stopped

  chat-ui:
    build: .
    container_name: local-chat-ui
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - "G:/local-ai/docs:/docs"
      - "G:/local-ai/chroma_db:/chroma_db"
      - "G:/local-ai/chat_history:/chat_history"
    environment:
      - VLLM_API_BASE=http://vllm:8000/v1
      - MODEL_NAME=Qwen/Qwen2.5-7B-Instruct
      - DOCS_DIR=/docs
      - CHROMA_DB_PATH=/chroma_db
      - CHAT_HISTORY_DIR=/chat_history
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=poll
    depends_on:
      - vllm
    restart: unless-stopped
